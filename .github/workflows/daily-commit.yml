name: Daily Commit Workflow

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: 23f1002806@ds.study.iitm.ac.in Daily Commit Step
        run: |
          echo "Daily run at $(date)" >> daily_log.txt
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add daily_log.txt
          git commit -m "Automated daily commit run"
          sleep 10
          git push
